<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Diamond ERP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.75),
        rgba(0,0,0,.75)
    ),
    url('https://images.unsplash.com/photo-1486006920555-c77dcf18193c');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

}

.login-box{

    width:500px;

    background:#07111f;

    border:1px solid #ff9800;

    border-radius:25px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 30px rgba(255,152,0,.3);

}

.logo{

    font-size:90px;

    margin-bottom:10px;

}

.system{

    color:white;

    font-size:32px;

    font-weight:bold;

}

.erp{

    color:#ff9800;

}

.powered{

    color:#c7c7c7;

    font-style:italic;

    margin-top:5px;

    margin-bottom:30px;

}

.batalhao{

    font-size:70px;

    font-weight:900;

    color:white;

    line-height:70px;

    text-transform:uppercase;

}

.pneus{

    color:#ff9800;

}

.modulos{

    margin-top:20px;

    margin-bottom:35px;

    color:white;

    font-size:15px;

}

input{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border-radius:10px;

    border:1px solid #444;

    background:#0c1727;

    color:white;

    font-size:16px;

}

button{

    width:100%;

    padding:18px;

    border:none;

    border-radius:10px;

    background:#ff9800;

    color:black;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    background:#ffb74d;

}

.info{

    margin-top:25px;

    color:white;

    font-size:18px;

}

.info span{

    color:#ff9800;

    font-weight:bold;

}

.footer{

    margin-top:35px;

    color:#bdbdbd;

    font-size:13px;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
🔧
</div>

<div class="system">
System Diamond <span class="erp">ERP</span>
</div>

<div class="powered">
powered by LC Solutions
</div>

<div class="batalhao">

Batalhão<br>

<span class="pneus">
dos Pneus
</span>

</div>

<div class="modulos">

📦 Gestão de Estoque • 💰 Vendas • 🔧 Serviços • 📅 Agendamentos

</div>

<input
type="email"
id="email"
placeholder="Digite seu e-mail">

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="fazerLogin()">
ENTRAR NO SISTEMA
</button>

<div class="info">

Gestão completa para sua oficina.<br>

Mais controle,
<span>mais resultados!</span>

</div>

<div class="footer">

System Diamond ERP v1.0<br>

Desenvolvido por Lucas Alves

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>

</html>
