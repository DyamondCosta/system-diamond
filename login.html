<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Diamond ERP</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:450px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    font-size:70px;
    margin-bottom:10px;
}

.titulo{
    font-size:32px;
    font-weight:bold;
    color:#0f172a;
}

.subtitulo{
    color:#64748b;
    margin-bottom:25px;
}

.cliente{
    background:#f1f5f9;
    padding:15px;
    border-radius:10px;
    margin-bottom:25px;
}

.cliente h3{
    margin:0;
    color:#0f172a;
}

.cliente p{
    margin:5px 0 0;
    color:#64748b;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1e293b;
}

.footer{
    margin-top:25px;
    font-size:13px;
    color:#64748b;
}

.recursos{
    margin-top:15px;
    font-size:14px;
    color:#475569;
}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">
💎
</div>

<div class="titulo">
System Diamond ERP
</div>

<div class="subtitulo">
powered by LC Solutions
</div>

<div class="cliente">

<h3>
🛞 Batalhão dos Pneus
</h3>

<p>
Gestão de Estoque • Vendas • Serviços • Agendamentos
</p>

</div>

<input
type="email"
id="email"
placeholder="Digite seu e-mail">

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="fazerLogin()">
Entrar no Sistema
</button>

<div class="recursos">

✔ Controle de Estoque<br>
✔ Gestão de Clientes<br>
✔ Controle Financeiro<br>
✔ Agendamentos

</div>

<div class="footer">

System Diamond ERP v1.0<br>
Desenvolvido por Lucas Alves

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>
</html>
