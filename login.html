<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LC Solutions ERP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.75)
),
url('https://images.unsplash.com/photo-1486006920555-c77dcf18193c');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

}

.login-box{

width:420px;

background:#07111f;

border:1px solid #ff9800;

border-radius:20px;

padding:30px;

text-align:center;

box-shadow:
0 0 25px rgba(255,152,0,.3);

}

.system{

color:white;

font-size:24px;

font-weight:bold;

}

.erp{

color:#ff9800;

}

.powered{

color:#c7c7c7;

font-style:italic;

font-size:13px;

margin-top:5px;

margin-bottom:20px;

}

.batalhao{

font-size:52px;

font-weight:900;

color:white;

line-height:50px;

text-transform:uppercase;

}

.pneus{

color:#ff9800;

}

.modulos{

margin-top:15px;

margin-bottom:20px;

color:white;

font-size:13px;

line-height:20px;

}

input{

width:100%;

padding:12px;

margin-bottom:12px;

border-radius:10px;

border:1px solid #444;

background:#0c1727;

color:white;

font-size:15px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#ff9800;

color:black;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#ffb74d;

}

.info{

margin-top:20px;

color:white;

font-size:15px;

}

.info span{

color:#ff9800;

font-weight:bold;

}

.footer{

margin-top:25px;

color:#bdbdbd;

font-size:12px;

}

</style>

</head>

<body>

<div class="login-box">

<img
src="img/logo-batalhao.jpeg"
style="
width:110px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(255,255,255,.2);
">

<div class="system">
LC Solutions <span class="erp">ERP</span>
</div>

<div class="powered">
Sistema desenvolvido por LC Solutions
</div>

<div class="batalhao">

BATALHÃO<br>

<span class="pneus">
DOS PNEUS
</span>

</div>

<div class="modulos">

📦 Gestão de Estoque<br>
💰 Vendas • 🔧 Serviços • 📅 Agendamentos

</div>

<input
type="email"
id="email"
placeholder="Digite seu e-mail">

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="fazerLogin()">
ENTRAR NO SISTEMA
</button>

<div class="info">

Gestão completa para sua oficina.

<br>

Mais controle, <span>mais resultados!</span>

</div>

<div class="footer">

LC Solutions ERP v1.0

<br>

Desenvolvido por L. Costa

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/login.js"></script>

</body>

</html>
