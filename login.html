<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRUVENX ERP</title>
<style>

* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    background:#060c18;
}

.bg {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:0;
    background-image:
        linear-gradient(135deg,
            rgba(4,8,18,0.85) 0%,
            rgba(6,12,24,0.72) 50%,
            rgba(4,8,18,0.88) 100%),
        url('https://images.unsplash.com/photo-1580339652462-4b7c2d83f1f5?w=1920&q=85&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
}
.bg::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0; height:50%;
    background:linear-gradient(to top, rgba(255,80,0,0.12), transparent);
}

.vinheta {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:0;
    background:radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.65) 100%);
    pointer-events:none;
}

/* PNEUS GRANDES NOS LADOS */
.pneu-esq {
    position:fixed;
    left:-120px; top:50%;
    z-index:2; opacity:0.8;
    animation:girar-esq 8s linear infinite;
}
.pneu-dir {
    position:fixed;
    right:-120px; top:50%;
    z-index:2; opacity:0.8;
    animation:girar-dir 8s linear infinite;
}
@keyframes girar-esq {
    from { transform:translateY(-50%) rotate(0deg); }
    to   { transform:translateY(-50%) rotate(360deg); }
}
@keyframes girar-dir {
    from { transform:translateY(-50%) rotate(0deg); }
    to   { transform:translateY(-50%) rotate(-360deg); }
}

/* PNEUS CANTOS */
.pneu-canto { position:fixed; z-index:2; opacity:0.35; }
.pneu-canto.tl { top:-55px; left:-55px; animation:rot 14s linear infinite; }
.pneu-canto.tr { top:-55px; right:-55px; animation:rot-r 14s linear infinite; }
.pneu-canto.bl { bottom:-55px; left:-55px; animation:rot-r 14s linear infinite; }
.pneu-canto.br { bottom:-55px; right:-55px; animation:rot 14s linear infinite; }
@keyframes rot   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes rot-r { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }

/* CARROS NA PARTE INFERIOR */
.carro-esq {
    position:fixed;
    bottom:0; left:-40px;
    z-index:3;
    animation:bounce 3.5s ease-in-out infinite;
    filter:drop-shadow(0 10px 30px rgba(255,152,0,0.2));
}
.carro-dir {
    position:fixed;
    bottom:0; right:-40px;
    z-index:3;
    animation:bounce 3.5s ease-in-out infinite;
    animation-delay:0.8s;
    filter:drop-shadow(0 10px 30px rgba(255,152,0,0.2));
}
@keyframes bounce {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-8px); }
}

/* FARÓIS PULSANDO */
.farol-luz { animation:farol 2.5s ease-in-out infinite; }
@keyframes farol {
    0%,100% { opacity:0.6; }
    50%      { opacity:1; }
}

/* RODAS GIRANDO */
.roda-gira { animation:roda 1.2s linear infinite; }
@keyframes roda {
    from { transform:rotate(0deg); }
    to   { transform:rotate(360deg); }
}

/* PARTÍCULAS */
.particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
.particle { position:absolute; width:2px; height:2px; background:#ff9800; border-radius:50%; opacity:0; animation:float 7s infinite; }
.particle:nth-child(1) { left:5%;  animation-delay:0s;   animation-duration:8s; }
.particle:nth-child(2) { left:15%; animation-delay:1.2s; animation-duration:6s; }
.particle:nth-child(3) { left:30%; animation-delay:2s;   animation-duration:9s; }
.particle:nth-child(4) { left:50%; animation-delay:0.8s; animation-duration:7s; }
.particle:nth-child(5) { left:65%; animation-delay:1.8s; animation-duration:6s; }
.particle:nth-child(6) { left:78%; animation-delay:3s;   animation-duration:8s; }
.particle:nth-child(7) { left:90%; animation-delay:0.4s; animation-duration:7s; }
.particle:nth-child(8) { left:42%; animation-delay:4s;   animation-duration:9s; }
@keyframes float {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.2; }
    100% { transform:translateY(-50px) scale(2); opacity:0; }
}

/* LOGIN BOX */
.login-box {
    width:420px;
    background:rgba(4,10,22,0.9);
    border:1px solid rgba(255,152,0,0.35);
    border-radius:20px;
    padding:32px;
    text-align:center;
    box-shadow: 0 0 0 1px rgba(255,152,0,0.07), 0 30px 80px rgba(0,0,0,0.9), 0 0 100px rgba(255,100,0,0.08);
    position:relative;
    z-index:10;
    backdrop-filter:blur(18px);
}
.login-box::before {
    content:'';
    position:absolute;
    top:0; left:10%; right:10%; height:2px;
    background:linear-gradient(90deg, transparent, #ff9800, transparent);
}
.login-box::after {
    content:'';
    position:absolute;
    bottom:0; left:20%; right:20%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.2), transparent);
}
.system { color:white; font-size:23px; font-weight:800; letter-spacing:2px; }
.erp { color:#ff9800; }
.powered { color:rgba(255,255,255,0.28); font-style:italic; font-size:11px; margin-top:4px; margin-bottom:16px; }
.batalhao { font-size:50px; font-weight:900; color:white; line-height:52px; text-transform:uppercase; text-shadow:0 0 40px rgba(255,152,0,0.2); }
.pneus { color:#ff9800; text-shadow:0 0 30px rgba(255,152,0,0.35); }
.modulos { margin-top:14px; margin-bottom:18px; color:rgba(255,255,255,0.4); font-size:12px; line-height:22px; }
.divider { height:1px; background:linear-gradient(90deg, transparent, rgba(255,152,0,0.25), transparent); margin:16px 0; }
input { width:100%; padding:13px 16px; margin-bottom:11px; border-radius:10px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.04); color:white; font-size:14px; transition:all 0.3s; }
input:focus { outline:none; border-color:rgba(255,152,0,0.55); background:rgba(255,152,0,0.04); box-shadow:0 0 0 3px rgba(255,152,0,0.07); }
input::placeholder { color:rgba(255,255,255,0.22); }
button { width:100%; padding:14px; border:none; border-radius:10px; background:linear-gradient(135deg, #ff9800, #e65c00); color:#07111f; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.3s; letter-spacing:1px; text-transform:uppercase; box-shadow:0 4px 25px rgba(255,152,0,0.35); }
button:hover { transform:translateY(-2px); box-shadow:0 8px 35px rgba(255,152,0,0.55); }
button:active { transform:translateY(0); }
.info { margin-top:16px; color:rgba(255,255,255,0.38); font-size:13px; line-height:1.9; }
.info span { color:#ff9800; font-weight:700; }
.footer { margin-top:18px; color:rgba(255,255,255,0.14); font-size:11px; line-height:1.8; }

</style>
</head>
