<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRUVENX ERP</title>
<style>

* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    background:#060c18;
}

/* FUNDO ESCURO */
.bg {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:0;
    background:
        radial-gradient(ellipse at 50% 100%, rgba(255,100,0,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 0%, rgba(0,10,30,0.8) 0%, transparent 80%),
        #060c18;
}

/* VINHETA */
.vinheta {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:1;
    background:radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.7) 100%);
    pointer-events:none;
}

/* CARRO ESQUERDO */
.carro-esq {
    position:fixed;
    left:0; bottom:0;
    width:42vw;
    height:65vh;
    z-index:2;
    background:
        linear-gradient(to right, rgba(6,12,24,0) 60%, rgba(6,12,24,0.95) 100%),
        linear-gradient(to top, rgba(6,12,24,0.3) 0%, rgba(6,12,24,0) 40%),
        url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=900&q=90&auto=format&fit=crop') right center/cover no-repeat;
    animation:car-float 4s ease-in-out infinite;
    filter:saturate(1.1) brightness(0.85);
}

/* CARRO DIREITO */
.carro-dir {
    position:fixed;
    right:0; bottom:0;
    width:42vw;
    height:65vh;
    z-index:2;
    background:
        linear-gradient(to left, rgba(6,12,24,0) 60%, rgba(6,12,24,0.95) 100%),
        linear-gradient(to top, rgba(6,12,24,0.3) 0%, rgba(6,12,24,0) 40%),
        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=900&q=90&auto=format&fit=crop') left center/cover no-repeat;
    animation:car-float 4s ease-in-out infinite;
    animation-delay:0.7s;
    filter:saturate(1.1) brightness(0.85);
    transform:scaleX(-1);
}

/* BRILHO DOS FARÓIS */
.carro-esq::after {
    content:'';
    position:absolute;
    right:-20px; top:30%;
    width:120px; height:80px;
    background:radial-gradient(ellipse, rgba(255,220,100,0.25) 0%, transparent 70%);
    animation:farol-glow 2.5s ease-in-out infinite;
}
.carro-dir::after {
    content:'';
    position:absolute;
    left:-20px; top:30%;
    width:120px; height:80px;
    background:radial-gradient(ellipse, rgba(255,220,100,0.25) 0%, transparent 70%);
    animation:farol-glow 2.5s ease-in-out infinite;
    animation-delay:0.5s;
}

@keyframes car-float {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-10px); }
}

/* Corrigir espelhamento do carro direito com float */
.carro-dir {
    animation:car-float-dir 4s ease-in-out infinite;
    animation-delay:0.7s;
}
@keyframes car-float-dir {
    0%,100% { transform:scaleX(-1) translateY(0); }
    50%      { transform:scaleX(-1) translateY(-10px); }
}

@keyframes farol-glow {
    0%,100% { opacity:0.6; transform:scale(1); }
    50%      { opacity:1; transform:scale(1.15); }
}

/* LINHA DO CHÃO */
.ground {
    position:fixed;
    bottom:0; left:0; right:0;
    height:3px;
    z-index:3;
    background:linear-gradient(90deg,
        transparent 0%,
        rgba(255,152,0,0.2) 15%,
        rgba(255,152,0,0.6) 50%,
        rgba(255,152,0,0.2) 85%,
        transparent 100%);
    box-shadow:0 0 20px rgba(255,152,0,0.3);
}

/* PNEUS CANTOS */
.pneu-canto { position:fixed; z-index:4; opacity:0.3; }
.pneu-canto.tl { top:-50px; left:-50px; animation:rot 14s linear infinite; }
.pneu-canto.tr { top:-50px; right:-50px; animation:rot-r 14s linear infinite; }
.pneu-canto.bl { bottom:-50px; left:-50px; animation:rot-r 14s linear infinite; }
.pneu-canto.br { bottom:-50px; right:-50px; animation:rot 14s linear infinite; }
@keyframes rot   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes rot-r { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }

/* PARTÍCULAS */
.particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:3; pointer-events:none; }
.particle { position:absolute; width:2px; height:2px; background:#ff9800; border-radius:50%; opacity:0; animation:float 7s infinite; }
.particle:nth-child(1) { left:5%;  animation-delay:0s;   animation-duration:8s; }
.particle:nth-child(2) { left:15%; animation-delay:1.2s; animation-duration:6s; }
.particle:nth-child(3) { left:30%; animation-delay:2s;   animation-duration:9s; }
.particle:nth-child(4) { left:50%; animation-delay:0.8s; animation-duration:7s; }
.particle:nth-child(5) { left:65%; animation-delay:1.8s; animation-duration:6s; }
.particle:nth-child(6) { left:78%; animation-delay:3s;   animation-duration:8s; }
.particle:nth-child(7) { left:90%; animation-delay:0.4s; animation-duration:7s; }
.particle:nth-child(8) { left:42%; animation-delay:4s;   animation-duration:9s; }
@keyframes float {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.2; }
    100% { transform:translateY(-50px) scale(2); opacity:0; }
}

/* LOGIN BOX */
.login-box {
    width:420px;
    background:rgba(4,10,22,0.92);
    border:1px solid rgba(255,152,0,0.35);
    border-radius:20px;
    padding:32px;
    text-align:center;
    box-shadow:
        0 0 0 1px rgba(255,152,0,0.07),
        0 30px 80px rgba(0,0,0,0.95),
        0 0 100px rgba(255,100,0,0.08);
    position:relative;
    z-index:10;
    backdrop-filter:blur(20px);
}
.login-box::before {
    content:'';
    position:absolute;
    top:0; left:10%; right:10%; height:2px;
    background:linear-gradient(90deg, transparent, #ff9800, transparent);
}
.login-box::after {
    content:'';
    position:absolute;
    bottom:0; left:20%; right:20%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.2), transparent);
}

.system { color:white; font-size:23px; font-weight:800; letter-spacing:2px; }
.erp { color:#ff9800; }
.powered { color:rgba(255,255,255,0.28); font-style:italic; font-size:11px; margin-top:4px; margin-bottom:16px; }
.batalhao { font-size:50px; font-weight:900; color:white; line-height:52px; text-transform:uppercase; text-shadow:0 0 40px rgba(255,152,0,0.2); }
.pneus { color:#ff9800; text-shadow:0 0 30px rgba(255,152,0,0.35); }
.modulos { margin-top:14px; margin-bottom:18px; color:rgba(255,255,255,0.4); font-size:12px; line-height:22px; }
.divider { height:1px; background:linear-gradient(90deg, transparent, rgba(255,152,0,0.25), transparent); margin:16px 0; }

input { width:100%; padding:13px 16px; margin-bottom:11px; border-radius:10px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.04); color:white; font-size:14px; transition:all 0.3s; }
input:focus { outline:none; border-color:rgba(255,152,0,0.55); background:rgba(255,152,0,0.04); box-shadow:0 0 0 3px rgba(255,152,0,0.07); }
input::placeholder { color:rgba(255,255,255,0.22); }

button { width:100%; padding:14px; border:none; border-radius:10px; background:linear-gradient(135deg, #ff9800, #e65c00); color:#07111f; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.3s; letter-spacing:1px; text-transform:uppercase; box-shadow:0 4px 25px rgba(255,152,0,0.35); }
button:hover { transform:translateY(-2px); box-shadow:0 8px 35px rgba(255,152,0,0.55); }
button:active { transform:translateY(0); }

.info { margin-top:16px; color:rgba(255,255,255,0.38); font-size:13px; line-height:1.9; }
.info span { color:#ff9800; font-weight:700; }
.footer { margin-top:18px; color:rgba(255,255,255,0.14); font-size:11px; line-height:1.8; }

</style>
</head>
