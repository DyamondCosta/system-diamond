<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRUVENX ERP</title>
<style>

* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    background:#060c18;
}

/* FUNDO */
.bg {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:0;
    background:
        radial-gradient(ellipse at 20% 50%, rgba(255,152,0,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 50%, rgba(255,152,0,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(255,100,0,0.08) 0%, transparent 50%);
}

/* PISO REFLEXIVO */
.floor {
    position:fixed;
    bottom:0; left:0; right:0;
    height:35%;
    background:linear-gradient(to top,
        rgba(255,152,0,0.04) 0%,
        rgba(10,20,40,0.3) 40%,
        transparent 100%);
    z-index:0;
}

/* LINHA DO CHÃO */
.ground-line {
    position:fixed;
    bottom:22%;
    left:0; right:0;
    height:1px;
    background:linear-gradient(90deg,
        transparent 0%,
        rgba(255,152,0,0.15) 20%,
        rgba(255,152,0,0.3) 50%,
        rgba(255,152,0,0.15) 80%,
        transparent 100%);
    z-index:1;
}

/* CARROS */
.carro-esq {
    position:fixed;
    left:-20px;
    bottom:18%;
    z-index:2;
    animation:carro-esq-idle 3s ease-in-out infinite;
}

.carro-dir {
    position:fixed;
    right:-20px;
    bottom:18%;
    z-index:2;
    animation:carro-dir-idle 3s ease-in-out infinite;
    animation-delay:0.5s;
}

@keyframes carro-esq-idle {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-6px); }
}

@keyframes carro-dir-idle {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-6px); }
}

/* PNEUS GIRANDO */
.roda { animation:girar 1.5s linear infinite; }
@keyframes girar {
    from { transform-origin:center; transform:rotate(0deg); }
    to   { transform-origin:center; transform:rotate(360deg); }
}

/* FAROL PULSANDO */
.farol { animation:farol-pulse 2s ease-in-out infinite; }
@keyframes farol-pulse {
    0%,100% { opacity:0.7; }
    50%      { opacity:1; }
}

/* REFLEXO NO CHÃO */
.reflexo {
    position:fixed;
    bottom:18%;
    width:280px;
    height:30px;
    background:radial-gradient(ellipse, rgba(255,152,0,0.12) 0%, transparent 70%);
    z-index:1;
    filter:blur(4px);
}
.reflexo-esq { left:20px; }
.reflexo-dir { right:20px; }

/* PARTÍCULAS */
.particles {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    z-index:0; pointer-events:none;
}
.particle {
    position:absolute;
    width:2px; height:2px;
    background:#ff9800;
    border-radius:50%;
    opacity:0;
    animation:float 7s infinite;
}
.particle:nth-child(1)  { left:5%;  animation-delay:0s;   animation-duration:8s; }
.particle:nth-child(2)  { left:15%; animation-delay:1.2s; animation-duration:6s; }
.particle:nth-child(3)  { left:30%; animation-delay:2s;   animation-duration:9s; }
.particle:nth-child(4)  { left:50%; animation-delay:0.8s; animation-duration:7s; }
.particle:nth-child(5)  { left:65%; animation-delay:1.8s; animation-duration:6s; }
.particle:nth-child(6)  { left:78%; animation-delay:3s;   animation-duration:8s; }
.particle:nth-child(7)  { left:90%; animation-delay:0.4s; animation-duration:7s; }
.particle:nth-child(8)  { left:42%; animation-delay:4s;   animation-duration:9s; }

@keyframes float {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.2; }
    100% { transform:translateY(-50px) scale(2); opacity:0; }
}

/* LOGIN BOX */
.login-box {
    width:420px;
    background:rgba(5,12,25,0.9);
    border:1px solid rgba(255,152,0,0.3);
    border-radius:20px;
    padding:32px;
    text-align:center;
    box-shadow:
        0 0 0 1px rgba(255,152,0,0.06),
        0 30px 80px rgba(0,0,0,0.9),
        0 0 80px rgba(255,100,0,0.08);
    position:relative;
    z-index:10;
    backdrop-filter:blur(14px);
}
.login-box::before {
    content:'';
    position:absolute;
    top:0; left:12%; right:12%; height:2px;
    background:linear-gradient(90deg, transparent, #ff9800, transparent);
}
.login-box::after {
    content:'';
    position:absolute;
    bottom:0; left:20%; right:20%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.2), transparent);
}

.system { color:white; font-size:23px; font-weight:800; letter-spacing:2px; }
.erp { color:#ff9800; }
.powered { color:rgba(255,255,255,0.3); font-style:italic; font-size:11px; margin-top:4px; margin-bottom:16px; }
.batalhao { font-size:50px; font-weight:900; color:white; line-height:52px; text-transform:uppercase; text-shadow:0 0 40px rgba(255,152,0,0.25); }
.pneus { color:#ff9800; text-shadow:0 0 30px rgba(255,152,0,0.4); }
.modulos { margin-top:14px; margin-bottom:18px; color:rgba(255,255,255,0.45); font-size:12px; line-height:22px; }
.divider { height:1px; background:linear-gradient(90deg, transparent, rgba(255,152,0,0.25), transparent); margin:16px 0; }

input {
    width:100%; padding:13px 16px; margin-bottom:11px;
    border-radius:10px; border:1px solid rgba(255,255,255,0.07);
    background:rgba(255,255,255,0.04); color:white; font-size:14px; transition:all 0.3s;
}
input:focus { outline:none; border-color:rgba(255,152,0,0.55); background:rgba(255,152,0,0.04); box-shadow:0 0 0 3px rgba(255,152,0,0.07); }
input::placeholder { color:rgba(255,255,255,0.22); }

button {
    width:100%; padding:14px; border:none; border-radius:10px;
    background:linear-gradient(135deg, #ff9800, #e65c00);
    color:#07111f; font-size:16px; font-weight:800; cursor:pointer;
    transition:all 0.3s; letter-spacing:1px; text-transform:uppercase;
    box-shadow:0 4px 25px rgba(255,152,0,0.35);
}
button:hover { transform:translateY(-2px); box-shadow:0 8px 35px rgba(255,152,0,0.55); }
button:active { transform:translateY(0); }

.info { margin-top:16px; color:rgba(255,255,255,0.4); font-size:13px; line-height:1.9; }
.info span { color:#ff9800; font-weight:700; }
.footer { margin-top:18px; color:rgba(255,255,255,0.15); font-size:11px; line-height:1.8; }

</style>
</head>
<body>

<div class="bg"></div>
<div class="floor"></div>
<div class="ground-line"></div>

<!-- REFLEXOS NO CHÃO -->
<div class="reflexo reflexo-esq"></div>
<div class="reflexo reflexo-dir"></div>

        <!-- Luz projetada -->

    </g>

    <!-- Lanterna traseira -->
    <rect x="8" y="78" width="16" height="10" rx="2"
        fill="rgba(255,50,50,0.8)" stroke="rgba(255,100,100,0.5)" stroke-width="1"/>

    <!-- RODA TRASEIRA -->
    <g transform="translate(65, 115)">
        <circle r="32" fill="#0a0f1a" stroke="rgba(255,152,0,0.5)" stroke-width="2"/>
        <circle r="24" fill="#141926" stroke="rgba(255,152,0,0.2)" stroke-width="1"/>
        <circle r="10" fill="#1a2035" stroke="rgba(255,152,0,0.6)" stroke-width="2"/>
        <circle r="4" fill="#ff9800"/>
        <g class="roda">
            <line x1="0" y1="-22" x2="0" y2="22" stroke="rgba(255,152,0,0.5)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-22" y1="0" x2="22" y2="0" stroke="rgba(255,152,0,0.5)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-16" y1="-16" x2="16" y2="16" stroke="rgba(255,152,0,0.3)" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="-16" x2="-16" y2="16" stroke="rgba(255,152,0,0.3)" stroke-width="2" stroke-linecap="round"/>
        </g>
    </g>

    <!-- RODA DIANTEIRA -->
    <g transform="translate(225, 115)">
        <circle r="32" fill="#0a0f1a" stroke="rgba(255,152,0,0.5)" stroke-width="2"/>
        <circle r="24" fill="#141926" stroke="rgba(255,152,0,0.2)" stroke-width="1"/>
        <circle r="10" fill="#1a2035" stroke="rgba(255,152,0,0.6)" stroke-width="2"/>
        <circle r="4" fill="#ff9800"/>
        <g class="roda">
            <line x1="0" y1="-22" x2="0" y2="22" stroke="rgba(255,152,0,0.5)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-22" y1="0" x2="22" y2="0" stroke="rgba(255,152,0,0.5)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-16" y1="-16" x2="16" y2="16" stroke="rgba(255,152,0,0.3)" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="-16" x2="-16" y2="16" stroke="rgba(255,152,0,0.3)" stroke-width="2" stroke-linecap="round"/>
        </g>
    </g>

    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
</svg>
</div>
