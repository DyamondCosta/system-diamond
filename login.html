<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRUVENX ERP</title>
<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    background:#0a0f1a;
}

/* FUNDO — CARRO ESPORTIVO */
.bg {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    background-image:
        linear-gradient(135deg,
            rgba(5,10,20,0.88) 0%,
            rgba(10,15,30,0.75) 50%,
            rgba(5,10,20,0.92) 100%),
        url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=1920&q=80');
    background-size:cover;
    background-position:center;
    filter:saturate(0.8);
}

/* BRILHO LARANJA NA BASE */
.bg::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0;
    height:40%;
    background:linear-gradient(to top, rgba(255,100,0,0.12), transparent);
}

/* BRILHO CENTRAL SUAVE */
.glow {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:700px; height:400px;
    background:radial-gradient(ellipse, rgba(255,152,0,0.07) 0%, transparent 70%);
    z-index:0;
    pointer-events:none;
}

/* PARTÍCULAS */
.particles {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    pointer-events:none;
}

.particle {
    position:absolute;
    width:2px; height:2px;
    background:#ff9800;
    border-radius:50%;
    opacity:0;
    animation:float 7s infinite;
}

.particle:nth-child(1)  { left:8%;  animation-delay:0s;   animation-duration:8s; }
.particle:nth-child(2)  { left:20%; animation-delay:1.2s; animation-duration:6s; }
.particle:nth-child(3)  { left:35%; animation-delay:2s;   animation-duration:9s; }
.particle:nth-child(4)  { left:50%; animation-delay:0.8s; animation-duration:7s; }
.particle:nth-child(5)  { left:65%; animation-delay:1.8s; animation-duration:6s; }
.particle:nth-child(6)  { left:80%; animation-delay:3s;   animation-duration:8s; }
.particle:nth-child(7)  { left:92%; animation-delay:0.4s; animation-duration:7s; }
.particle:nth-child(8)  { left:45%; animation-delay:4s;   animation-duration:9s; }

@keyframes float {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.7; }
    90%  { opacity:0.2; }
    100% { transform:translateY(-50px) scale(2); opacity:0; }
}

/* BOX DE LOGIN */
.login-box {
    width:420px;
    background:rgba(5,12,25,0.88);
    border:1px solid rgba(255,152,0,0.3);
    border-radius:20px;
    padding:32px;
    text-align:center;
    box-shadow:
        0 0 0 1px rgba(255,152,0,0.06),
        0 30px 80px rgba(0,0,0,0.8),
        0 0 80px rgba(255,100,0,0.08);
    position:relative;
    z-index:1;
    backdrop-filter:blur(12px);
}

.login-box::before {
    content:'';
    position:absolute;
    top:0; left:12%; right:12%;
    height:2px;
    background:linear-gradient(90deg, transparent, #ff9800, transparent);
    border-radius:2px;
}

.login-box::after {
    content:'';
    position:absolute;
    bottom:0; left:20%; right:20%;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.2), transparent);
}

.system {
    color:white;
    font-size:23px;
    font-weight:800;
    letter-spacing:2px;
}

.erp { color:#ff9800; }

.powered {
    color:rgba(255,255,255,0.3);
    font-style:italic;
    font-size:11px;
    margin-top:4px;
    margin-bottom:16px;
    letter-spacing:0.5px;
}

.batalhao {
    font-size:50px;
    font-weight:900;
    color:white;
    line-height:52px;
    text-transform:uppercase;
    text-shadow:
        0 0 40px rgba(255,152,0,0.25),
        0 2px 10px rgba(0,0,0,0.5);
}

.pneus {
    color:#ff9800;
    text-shadow:0 0 30px rgba(255,152,0,0.4);
}

.modulos {
    margin-top:14px;
    margin-bottom:18px;
    color:rgba(255,255,255,0.45);
    font-size:12px;
    line-height:22px;
}

.divider {
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.25), transparent);
    margin:16px 0;
}

input {
    width:100%;
    padding:13px 16px;
    margin-bottom:11px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.07);
    background:rgba(255,255,255,0.04);
    color:white;
    font-size:14px;
    transition:all 0.3s;
}

input:focus {
    outline:none;
    border-color:rgba(255,152,0,0.55);
    background:rgba(255,152,0,0.04);
    box-shadow:0 0 0 3px rgba(255,152,0,0.07);
}

input::placeholder { color:rgba(255,255,255,0.22); }

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg, #ff9800, #e65c00);
    color:#07111f;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:all 0.3s;
    letter-spacing:1px;
    text-transform:uppercase;
    box-shadow:0 4px 25px rgba(255,152,0,0.35);
}

button:hover {
    transform:translateY(-2px);
    box-shadow:0 8px 35px rgba(255,152,0,0.55);
}

button:active { transform:translateY(0); }

.info {
    margin-top:16px;
    color:rgba(255,255,255,0.4);
    font-size:13px;
    line-height:1.9;
}

.info span {
    color:#ff9800;
    font-weight:700;
}

.footer {
    margin-top:18px;
    color:rgba(255,255,255,0.15);
    font-size:11px;
    line-height:1.8;
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="login-box">

    <img src="img/logo-batalhao.jpeg"
        style="width:105px;margin-bottom:14px;border-radius:14px;
        box-shadow:0 0 25px rgba(255,152,0,0.2),0 0 0 3px rgba(255,152,0,0.12);">

    <div class="system">PRUVENX <span class="erp">ERP</span></div>
    <div class="powered">Sistema desenvolvido por PRUVENX ERP</div>

    <div class="batalhao">
        BATALHÃO<br>
        <span class="pneus">DOS PNEUS</span>
    </div>

    <div class="modulos">
        🛞 Gestão de Estoque &nbsp;•&nbsp; 🔧 Serviços<br>
        💰 Vendas &nbsp;•&nbsp; 📅 Agendamentos
    </div>

    <div class="divider"></div>

    <input type="email" id="email" placeholder="✉️  Digite seu e-mail">
    <input type="password" id="senha" placeholder="🔒  Digite sua senha"
        onkeydown="if(event.key==='Enter') fazerLogin()">

    <button onclick="fazerLogin()">ENTRAR NO SISTEMA</button>

    <div class="info">
        Gestão completa para sua oficina.<br>
        Mais controle, <span>mais resultados!</span>
    </div>

    <div class="footer">
        PRUVENX ERP v1.0 &nbsp;•&nbsp; Desenvolvido por L. Costa
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>
</html>
