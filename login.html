<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRUVENX ERP</title>
<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    background:#0a0f1a;
}

/* FUNDO COM SVG AUTOMOTIVO ANIMADO */
.bg {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    background:
        linear-gradient(135deg, rgba(5,10,20,0.97) 0%, rgba(10,20,35,0.95) 100%);
}

/* PNEUS DECORATIVOS NO FUNDO */
.bg::before {
    content:'';
    position:absolute;
    top:-150px; left:-150px;
    width:500px; height:500px;
    border-radius:50%;
    border:40px solid rgba(255,152,0,0.04);
    box-shadow:
        inset 0 0 0 60px rgba(255,152,0,0.02),
        inset 0 0 0 120px rgba(255,152,0,0.02);
}

.bg::after {
    content:'';
    position:absolute;
    bottom:-100px; right:-100px;
    width:400px; height:400px;
    border-radius:50%;
    border:35px solid rgba(255,152,0,0.04);
    box-shadow:
        inset 0 0 0 50px rgba(255,152,0,0.02),
        inset 0 0 0 100px rgba(255,152,0,0.02);
}

/* LINHAS DE ESTRADA */
.road-lines {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    overflow:hidden;
}

.road-lines::before {
    content:'';
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%) perspective(400px) rotateX(25deg);
    transform-origin:bottom center;
    width:4px;
    height:60%;
    background:linear-gradient(to top, rgba(255,152,0,0.3), transparent);
    box-shadow:
        -180px 0 0 rgba(255,152,0,0.06),
        180px 0 0 rgba(255,152,0,0.06),
        -90px 0 0 rgba(255,152,0,0.08),
        90px 0 0 rgba(255,152,0,0.08);
}

/* BRILHO CENTRAL */
.glow {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:600px; height:600px;
    background:radial-gradient(circle, rgba(255,152,0,0.06) 0%, transparent 65%);
    z-index:0;
    pointer-events:none;
}

/* PARTÍCULAS */
.particles {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    pointer-events:none;
}

.particle {
    position:absolute;
    width:2px; height:2px;
    background:#ff9800;
    border-radius:50%;
    opacity:0;
    animation:float 6s infinite;
}

.particle:nth-child(1)  { left:10%; animation-delay:0s;   animation-duration:7s; }
.particle:nth-child(2)  { left:25%; animation-delay:1s;   animation-duration:5s; }
.particle:nth-child(3)  { left:40%; animation-delay:2s;   animation-duration:8s; }
.particle:nth-child(4)  { left:55%; animation-delay:0.5s; animation-duration:6s; }
.particle:nth-child(5)  { left:70%; animation-delay:1.5s; animation-duration:7s; }
.particle:nth-child(6)  { left:85%; animation-delay:3s;   animation-duration:5s; }
.particle:nth-child(7)  { left:15%; animation-delay:4s;   animation-duration:9s; }
.particle:nth-child(8)  { left:60%; animation-delay:2.5s; animation-duration:6s; }
.particle:nth-child(9)  { left:90%; animation-delay:1s;   animation-duration:8s; }
.particle:nth-child(10) { left:35%; animation-delay:3.5s; animation-duration:7s; }

@keyframes float {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-100px) scale(1.5); opacity:0; }
}

/* BOX DE LOGIN */
.login-box {
    width:420px;
    background:rgba(7,17,31,0.92);
    border:1px solid rgba(255,152,0,0.35);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:
        0 0 0 1px rgba(255,152,0,0.08),
        0 25px 60px rgba(0,0,0,0.7),
        0 0 60px rgba(255,152,0,0.07);
    position:relative;
    z-index:1;
    backdrop-filter:blur(10px);
}

.login-box::before {
    content:'';
    position:absolute;
    top:0; left:15%; right:15%;
    height:2px;
    background:linear-gradient(90deg, transparent, #ff9800, transparent);
    border-radius:2px;
}

.system {
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

.erp { color:#ff9800; }

.powered {
    color:rgba(255,255,255,0.35);
    font-style:italic;
    font-size:12px;
    margin-top:4px;
    margin-bottom:18px;
}

.batalhao {
    font-size:50px;
    font-weight:900;
    color:white;
    line-height:50px;
    text-transform:uppercase;
    text-shadow:0 0 30px rgba(255,152,0,0.2);
}

.pneus { color:#ff9800; }

.modulos {
    margin-top:15px;
    margin-bottom:20px;
    color:rgba(255,255,255,0.55);
    font-size:13px;
    line-height:22px;
}

/* DIVISOR */
.divider {
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,152,0,0.3), transparent);
    margin:18px 0;
}

input {
    width:100%;
    padding:13px 15px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.04);
    color:white;
    font-size:15px;
    transition:all 0.3s;
}

input:focus {
    outline:none;
    border-color:rgba(255,152,0,0.6);
    background:rgba(255,152,0,0.04);
    box-shadow:0 0 0 3px rgba(255,152,0,0.08);
}

input::placeholder { color:rgba(255,255,255,0.25); }

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg, #ff9800, #e65c00);
    color:#07111f;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    transition:all 0.3s;
    letter-spacing:0.5px;
    box-shadow:0 4px 20px rgba(255,152,0,0.3);
}

button:hover {
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(255,152,0,0.5);
}

button:active { transform:translateY(0); }

.info {
    margin-top:18px;
    color:rgba(255,255,255,0.5);
    font-size:14px;
    line-height:1.8;
}

.info span {
    color:#ff9800;
    font-weight:bold;
}

.footer {
    margin-top:20px;
    color:rgba(255,255,255,0.2);
    font-size:11px;
    line-height:1.8;
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="road-lines"></div>
<div class="glow"></div>

<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="login-box">

    <img src="img/logo-batalhao.jpeg"
        style="width:110px;margin-bottom:15px;border-radius:15px;
        box-shadow:0 0 20px rgba(255,152,0,0.25),0 0 0 3px rgba(255,152,0,0.15);">

    <div class="system">PRUVENX <span class="erp">ERP</span></div>
    <div class="powered">Sistema desenvolvido por PRUVENX ERP</div>

    <div class="batalhao">
        BATALHÃO<br>
        <span class="pneus">DOS PNEUS</span>
    </div>

    <div class="modulos">
        🛞 Gestão de Estoque<br>
        💰 Vendas &nbsp;•&nbsp; 🔧 Serviços &nbsp;•&nbsp; 📅 Agendamentos
    </div>

    <div class="divider"></div>

    <input type="email" id="email" placeholder="✉️  Digite seu e-mail">
    <input type="password" id="senha" placeholder="🔒  Digite sua senha"
        onkeydown="if(event.key==='Enter') fazerLogin()">

    <button onclick="fazerLogin()">ENTRAR NO SISTEMA</button>

    <div class="info">
        Gestão completa para sua oficina.<br>
        Mais controle, <span>mais resultados!</span>
    </div>

    <div class="footer">
        PRUVENX ERP v1.0<br>
        Desenvolvido por L. Costa
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>
</html>
