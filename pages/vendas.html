<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendas</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="sidebar">

<h2>🛞 Batalhão</h2>

<p id="usuario-logado"></p>

<a href="../index.html">Dashboard</a> <a href="clientes.html">Clientes</a> <a href="pneus.html">Pneus</a> <a href="servicos.html">Serviços</a> <a href="vendas.html">Vendas</a>

<br>

<button id="btn-sair">
Sair
</button>

</div>

<div class="main">

<div class="header">

<h1>
💰 VENDAS
</h1>

</div>

<div class="container">

<h2>
Nova Venda
</h2>

<input
id="cliente"
placeholder="Cliente">

<br><br>

<select id="pneu_id">

<option value="">
Selecione o Pneu
</option>

</select>

<br><br>

<input
id="quantidade"
type="number"
placeholder="Quantidade">

<br><br>

<input
id="valor_total"
type="number"
placeholder="Valor Total">

<br><br>

<select id="forma_pagamento">

<option>
PIX
</option>

<option>
Dinheiro
</option>

<option>
Cartão Débito
</option>

<option>
Cartão Crédito
</option>

</select>

<br><br>

<textarea
id="observacao"
placeholder="Observação">
</textarea>

<br><br>

<button onclick="salvarVenda()">

Salvar Venda

</button>

<hr>

<h2>
Histórico de Vendas
</h2>

<input
id="pesquisa"
placeholder="Pesquisar Cliente"
onkeyup="filtrarVendas()">

<br><br>

<div id="lista-vendas"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/config.js"></script>

<script src="../js/auth.js"></script>
