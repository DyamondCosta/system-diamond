<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar"></div>

<div class="main">
<div class="header">
    <h1>📅 AGENDAMENTOS</h1>
    <p>Gerencie os agendamentos da oficina</p>
</div>

<div class="container">

    <h2 id="titulo-form">Novo Agendamento</h2>

    <div class="os-form-container">

        <div class="os-form-row">
            <div class="os-form-group">
                <input id="cliente" placeholder="Nome do Cliente">
            </div>
            <div class="os-form-group">
                <input id="telefone" placeholder="Telefone">
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group">
                <label style="font-size:12px;color:#6b7280;">Data</label>
                <input type="date" id="data_agendamento">
            </div>
            <div class="os-form-group">
                <label style="font-size:12px;color:#6b7280;">Hora</label>
                <input type="time" id="hora_agendamento">
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group full-width">
                <select id="servico_select">
                    <option value="">Selecione o Serviço</option>
                </select>
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group full-width">
                <input id="servico" placeholder="Ou descreva o serviço manualmente">
            </div>
        </div>

    </div>

    <br>
    <button onclick="salvarAgendamento()">💾 Salvar Agendamento</button>

    <hr>

    <div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;">
        <button onclick="filtrarStatus('TODOS')" style="background:#6b7280;">📋 Todos</button>
        <button onclick="filtrarStatus('PENDENTE')" style="background:#f59e0b;">⏳ Pendentes</button>
        <button onclick="filtrarStatus('CONFIRMADO')" style="background:#3b82f6;">✅ Confirmados</button>
        <button onclick="filtrarStatus('CONCLUIDO')" style="background:#10b981;">🏁 Concluídos</button>
        <button onclick="filtrarStatus('CANCELADO')" style="background:#ef4444;">❌ Cancelados</button>
    </div>

    <div id="lista-agendamentos"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/agendamentos.js"></script>
</body>
</html>
