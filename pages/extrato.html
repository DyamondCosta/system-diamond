<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrato</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar"></div>

<div class="main">
<div class="header">
    <h1>📊 EXTRATO</h1>
    <p>Relatório financeiro por período</p>
</div>

<div class="container">

    <h2>Filtrar por Período</h2>

    <div style="display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px;">
        <div>
            <label style="font-size:12px;color:#6b7280;">Data Inicial</label><br>
            <input type="date" id="data-inicio">
        </div>
        <div>
            <label style="font-size:12px;color:#6b7280;">Data Final</label><br>
            <input type="date" id="data-fim">
        </div>
        <button onclick="buscarExtrato()">🔍 Buscar</button>
        <button onclick="buscarHoje()" style="background:#6b7280;">📅 Hoje</button>
        <button onclick="buscarMesAtual()" style="background:#6b7280;">📅 Mês Atual</button>
        <button onclick="buscarMesAnterior()" style="background:#6b7280;">📅 Mês Anterior</button>
    </div>

    <div id="resumo-extrato"></div>

    <div id="lista-extrato"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/extrato.js"></script>
</body>
</html>
