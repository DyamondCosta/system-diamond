<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="sidebar">

        <h2>🛞 Batalhão</h2>

        <p id="usuario-logado"></p>

        <a href="../index.html">Dashboard</a>
        <a href="clientes.html">Clientes</a>
        <a href="pneus.html">Pneus</a>
        <a href="servicos.html">Serviços</a>

        <br>

        <button id="btn-sair">
            Sair
        </button>

    </div>

    <div class="main">

        <div class="header">
            <h1>SERVIÇOS</h1>
        </div>

        <div class="container">

            <h2>Novo Serviço</h2>

            <input id="nome" placeholder="Nome do Serviço">

            <br><br>

            <input id="categoria" placeholder="Categoria">

            <br><br>

            <input id="valor" placeholder="Valor">

            <br><br>

            <input id="tempo_estimado" placeholder="Tempo Estimado">

            <br><br>

            <button onclick="salvarServico()">
                Salvar Serviço
            </button>

            <hr>

            <h2>Serviços Cadastrados</h2>

            <input
                id="pesquisa"
                placeholder="Pesquisar serviço"
                onkeyup="filtrarServicos()">

            <br><br>

            <div id="lista-servicos"></div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/servicos.js"></script>

</body>

</html>
