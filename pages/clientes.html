<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar"></div>

<div class="main">
<div class="header">
    <h1>👥 CLIENTES</h1>
    <p>Cadastro e gerenciamento de clientes</p>
</div>

<div class="container">

    <h2 id="titulo-form">Novo Cliente</h2>

    <div class="os-form-container">

        <div class="os-form-row">
            <div class="os-form-group">
                <input id="nome" placeholder="Nome do Cliente">
            </div>
            <div class="os-form-group">
                <input id="telefone" placeholder="Telefone">
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group">
                <input id="placa" placeholder="Placa do Veículo">
            </div>
            <div class="os-form-group">
                <input id="veiculo" placeholder="Veículo (ex: Gol 2020)">
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group full-width">
                <textarea id="observacao" placeholder="Observações"></textarea>
            </div>
        </div>

    </div>

    <br>
    <button id="btn-salvar" onclick="salvarCliente()">💾 Salvar Cliente</button>
    <button id="btn-cancelar" onclick="cancelarEdicao()" style="display:none;background:#6b7280;margin-left:10px;">❌ Cancelar</button>

    <hr style="margin:30px 0;">

    <h2>Clientes Cadastrados</h2>
    <input id="pesquisa" placeholder="🔍 Pesquisar por nome, placa ou telefone..." onkeyup="filtrarClientes()">
    <br><br>
    <div id="lista-clientes"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/clientes.js"></script>
</body>
</html>
