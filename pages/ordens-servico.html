<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="sidebar">

<div style="text-align:center;">

<img
src="../img/logo-batalhao.jpeg"
class="logo-sidebar">

<h3 style="
margin-top:10px;
color:white;
font-size:18px;
">
Batalhão dos Pneus
</h3>

<p style="
font-size:12px;
opacity:.8;
margin-bottom:20px;
">
Sistema de Gestão
</p>

</div>

<p id="usuario-logado"></p>

<a href="../index.html">Dashboard</a>
<a href="clientes.html">Clientes</a>
<a href="pneus.html">Pneus</a>
<a href="servicos.html">Serviços</a>
<a href="vendas.html">Vendas</a>
<a href="ordens-servico.html">Ordens de Serviço</a>
<a href="caixa.html">Caixa</a>
<a href="agendamentos.html">Agendamentos</a>

<button id="btn-sair">
Sair
</button>

</div>

<div class="main">

<div class="header">

<h1>
📋 ORÇAMENTO
</h1>

<p>
Cadastro, acompanhamento e emissão de OS
</p>

</div>

<div class="container">

<h2>
Novo Orçamento
</h2>

<div class="os-form-container">

<div class="os-form-row">

<div class="os-form-group">
<input
id="cliente_nome"
placeholder="Nome do Cliente">
</div>

<div class="os-form-group">
<input
id="telefone"
placeholder="Telefone">
</div>

</div>

<div class="os-form-row">

<div class="os-form-group">
<input
id="placa"
placeholder="Placa">
</div>

<div class="os-form-group">
<input
id="veiculo"
placeholder="Veículo">
</div>

</div>

<div class="os-form-row">

<div class="os-form-group full-width">
<input
id="servico"
placeholder="Serviço Executado">
</div>

</div>

<div class="os-form-row">

<div class="os-form-group">
<input
id="valor_mao_obra"
placeholder="Valor Mão de Obra"
oninput="calcularTotal()">
</div>

<div class="os-form-group">
<input
id="valor_pecas"
placeholder="Valor Peças"
oninput="calcularTotal()">
</div>

</div>

<div class="os-form-row">

<div class="os-form-group">
<input
id="valor_total"
placeholder="Valor Total"
readonly>
</div>

<div class="os-form-group">

<select id="status">

<option>ABERTA</option>
<option>EM ANDAMENTO</option>
<option>AGUARDANDO PEÇAS</option>
<option>FINALIZADA</option>

</select>

</div>

</div>

<div class="os-form-row">

<div class="os-form-group full-width">

<textarea
id="observacao"
placeholder="Observações">
</textarea>

</div>

</div>

</div>

<br>

<button onclick="salvarOS()">
Salvar OS
</button>

<hr style="
margin:30px 0;
">

<h2>
Orçamento
</h2>

<div id="lista-os"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="../js/config.js"></script>

<script src="../js/auth.js"></script>

<script src="../js/ordens-servico.js"></script>

</body>

</html>
