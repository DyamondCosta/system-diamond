<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuários</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar"></div>

<div class="main">
<div class="header">
    <h1>⚙️ USUÁRIOS</h1>
    <p>Gerenciamento de acesso ao sistema</p>
</div>

<div class="container">

    <h2 id="titulo-form">Novo Usuário</h2>

    <div class="os-form-container">

        <div class="os-form-row">
            <div class="os-form-group">
                <input id="nome" placeholder="Nome completo">
            </div>
            <div class="os-form-group">
                <input id="email" placeholder="Email" type="email">
            </div>
        </div>

        <div class="os-form-row">
            <div class="os-form-group">
                <input id="senha" placeholder="Senha" type="password">
            </div>
            <div class="os-form-group">
                <select id="perfil">
                    <option value="admin">Administrador</option>
                    <option value="gerente">Gerente</option>
                    <option value="funcionario">Funcionário</option>
                </select>
            </div>
        </div>

    </div>

    <br>
    <button id="btn-salvar" onclick="salvarUsuario()">💾 Salvar Usuário</button>
    <button id="btn-cancelar" onclick="cancelarEdicao()" style="display:none;background:#6b7280;margin-left:10px;">❌ Cancelar</button>

    <hr>

    <h2>Usuários Cadastrados</h2>
    <div id="lista-usuarios"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/usuarios.js"></script>
</body>
</html>
